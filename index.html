<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>單字小夥伴 Word Buddy</title>
  <meta name="description" content="學單字、練造句、說英文的小幫手">
  <meta name="theme-color" content="#efe9e3">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <button id="btn-home" class="brand" type="button" title="回首頁">
      <span class="brand-emoji">🐣</span>
      <span class="brand-name">單字小夥伴</span>
    </button>
    <div class="topbar-right">
      <span id="star-count" class="star-count" title="收集到的星星">⭐ 0</span>
      <button id="btn-wordbook" class="btn-chip" type="button">📖 我的單字本</button>
    </div>
  </header>

  <main id="main">
    <!-- 進度指示 -->
    <ol id="steps" class="steps" aria-label="學習進度">
      <li class="step is-active" data-step="word">1. 學單字</li>
      <li class="step" data-step="sentence">2. 造句子</li>
      <li class="step" data-step="speak">3. 練發音</li>
    </ol>

    <!-- 階段 1：學單字 -->
    <section id="screen-word" class="screen is-active">
      <div class="mode-switch" role="group" aria-label="檢查引擎模式">
        <button id="mode-free" class="mode-btn" type="button" data-mode="free">🆓 免費模式</button>
        <button id="mode-ai" class="mode-btn" type="button" data-mode="ai">✨ AI 模式</button>
      </div>
      <p id="mode-hint" class="mode-hint"></p>
      <div id="daily-bar" class="daily-bar"></div>
      <h1 class="screen-title">今天想學什麼單字？🌱</h1>
      <form id="word-form" class="input-row" autocomplete="off">
        <input id="word-input" class="input-big" type="text" inputmode="latin"
               placeholder="輸入一個英文單字，例如 apple" autocapitalize="off" autocorrect="off" spellcheck="false" required>
        <button id="word-submit" class="btn btn-primary" type="submit">查查看</button>
      </form>
      <div id="word-feedback" class="feedback" aria-live="polite"></div>
      <div id="word-card" class="word-card hidden"></div>
    </section>

    <!-- 階段 2：造句 -->
    <section id="screen-sentence" class="screen">
      <h1 class="screen-title">用「<span id="sentence-word"></span>」造一個句子吧！✏️</h1>
      <div id="examples-box" class="examples-box hidden">
        <div class="examples-head">
          <span>💡 例句參考</span>
          <button id="btn-toggle-examples" class="btn-link btn-link-tight" type="button">隱藏例句</button>
        </div>
        <ul id="examples-list" class="examples-list"></ul>
      </div>
      <div class="input-col">
        <textarea id="sentence-input" class="input-big textarea" rows="3"
                  placeholder="例如：I eat an apple every day." autocapitalize="sentences" spellcheck="false"></textarea>
        <button id="sentence-submit" class="btn btn-primary" type="button">檢查句子</button>
      </div>
      <div id="sentence-feedback" class="feedback" aria-live="polite"></div>
      <button id="btn-back-word" class="btn-link" type="button">← 上一頁</button>
    </section>

    <!-- 階段 3：練發音 -->
    <section id="screen-speak" class="screen">
      <h1 class="screen-title">大聲唸出你的句子！🎤</h1>
      <p class="hint">先聽一次標準讀音，再按麥克風唸唸看，唸完按一下「我唸完了」。唸錯的字會變紅色，點紅色的字可以單獨再聽一次。</p>
      <div id="speak-sentence" class="speak-sentence" aria-live="polite"></div>
      <div class="speak-controls">
        <button id="btn-play-standard" class="btn btn-secondary" type="button">🔊 聽標準讀音</button>
        <button id="btn-record" class="btn btn-mic" type="button">🎤 換我唸</button>
      </div>
      <div id="speak-feedback" class="feedback" aria-live="polite"></div>
      <div class="speak-footer">
        <button id="btn-back-sentence" class="btn-link" type="button">← 修改句子</button>
        <button id="btn-skip-speak" class="btn-link" type="button">跳過發音練習 →</button>
      </div>
    </section>

    <!-- 過關畫面 -->
    <section id="screen-done" class="screen screen-done">
      <div class="confetti" aria-hidden="true"></div>
      <div class="done-emoji">🏆</div>
      <h1 class="screen-title" id="done-title">太棒了！</h1>
      <p id="done-message" class="done-message"></p>
      <button id="btn-again" class="btn btn-primary" type="button">再學一個單字 🚀</button>
    </section>

    <!-- 單字本 -->
    <section id="screen-book" class="screen">
      <h1 class="screen-title">我的單字本 📖</h1>
      <div class="book-toolbar">
        <input id="book-search" class="input-big book-search" type="search"
               placeholder="🔍 搜尋學過的單字…" autocapitalize="off" autocorrect="off" spellcheck="false">
        <button id="btn-quiz" class="btn btn-primary" type="button">🎯 考考我</button>
      </div>
      <div id="book-list" class="book-list"></div>
      <div id="sync-panel" class="sync-panel"></div>
      <button id="btn-book-close" class="btn btn-secondary" type="button">回去學單字</button>
    </section>

    <!-- 複習測驗 -->
    <section id="screen-quiz" class="screen">
      <h1 class="screen-title">考考我 🎯</h1>
      <p id="quiz-progress" class="hint"></p>
      <div class="quiz-box">
        <p class="quiz-prompt">仔細聽，然後拼出這個單字：</p>
        <button id="btn-quiz-play" class="btn btn-secondary" type="button">🔊 再聽一次</button>
        <form id="quiz-form" class="input-row" autocomplete="off">
          <input id="quiz-input" class="input-big" type="text" inputmode="latin"
                 placeholder="把聽到的單字拼出來" autocapitalize="off" autocorrect="off" spellcheck="false" required>
          <button class="btn btn-primary" type="submit">好了！</button>
        </form>
        <div id="quiz-feedback" class="feedback" aria-live="polite"></div>
      </div>
      <button id="btn-quiz-exit" class="btn-link" type="button">← 回單字本</button>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
